[module/workspaces]
type = internal/i3
label-focused = %name%
label-unfocused = %name%
label-urgent = %name%
format-prefix = "  "
foreground = #ffffff
background = #6c5ce7

[module/date]
type = internal/date
format = %Y-%m-%d %H:%M
foreground = #ffffff
background = #2d3436

[module/internet]
type = internal/network
format-up =  %essid%
format-down = 
foreground = #ffffff
background = #00b894

[module/cpu]
type = internal/cpu
format =  %usage%
foreground = #ffffff
background = #fdcb6e

[module/memory]
type = internal/memory
format =  %used_p%
foreground = #ffffff
background = #e17055

[module/volume]
type = internal/alsa
format-volume =  %volume%
foreground = #ffffff
background = #74b9ff

[module/battery]
type = internal/battery
format-charging =  %percentage%%
format-full =  %percentage%%
format-discharging =  %percentage%%
foreground = #ffffff
background = #a29bfe

[bar/gpt]
modules-left = workspaces
modules-center = date
modules-right = internet cpu memory volume battery
